<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Demux MPEG-TS — demuxer</title>
    <link rel="stylesheet" href="./demo-common.css" />
    <script type="module">
      import { TSDemux, Events } from "../../dist/demuxer.ts.esm.js";
      import { initDemuxDemo } from "./demo-common.js";

      initDemuxDemo({
        Events,
        formatLabel: "MPEG-TS",
        title: "Demux MPEG-TS",
        subtitle:
          "Parse Transport Stream (.ts) locally. Codec elementary streams can be decoded when decodeCodec is enabled.",
        accept: ".ts,video/mp2t",
        sampleUrl: "./1718677128314-48.ts",
        sampleButtonLabel: "Load sample .ts",
        createDemux: () =>
          new TSDemux({
            debug: true,
            decodeCodec: true,
          }),
        pushOptions: { done: true },
        hints: [
          "Uses dist/demuxer.ts.esm.js · push(..., { done: true }) signals end of buffer.",
          "decodeCodec: true enables elementary stream parsing used in this demo.",
        ],
      });
    </script>
  </head>
  <body>
    <div id="demux-demo-root"></div>
  </body>
</html>
