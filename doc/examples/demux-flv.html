<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Demux FLV — demuxer</title>
    <link rel="stylesheet" href="./demo-common.css" />
    <script type="module">
      import { FLVDemux, Events } from "../../dist/demuxer.flv.esm.js";
      import { initDemuxDemo, defaultEventSummary } from "./demo-common.js";

      function summarizeFlv(e) {
        if (!e || typeof e !== "object") return String(e);
        if (e.type === "tag" && e.tagType === 9 && e.videoData) {
          return `type=tag · tagType=9 · avcPacketType=${e.videoData.avcPacketType}`;
        }
        return null;
      }

      initDemuxDemo({
        Events,
        formatLabel: "FLV / F4V",
        title: "Demux FLV",
        subtitle:
          "Parse FLV/F4V locally. Video tag 9 summaries include AVC packet type when present.",
        accept: ".flv,.f4v,video/x-flv",
        createDemux: () =>
          new FLVDemux({
            debug: true,
          }),
        summarizeEvent: (e) => summarizeFlv(e) ?? defaultEventSummary(e),
        hints: [
          "Uses dist/demuxer.flv.esm.js",
          "Enable decodeCodec on FLVDemux if you need full H.264/AAC decode helpers.",
        ],
      });
    </script>
  </head>
  <body>
    <div id="demux-demo-root"></div>
  </body>
</html>
