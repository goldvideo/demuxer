<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Demux MP4 — demuxer</title>
    <link rel="stylesheet" href="./demo-common.css" />
    <script type="module">
      import { MP4Demux, Events } from "../../dist/demuxer.mp4.esm.js";
      import { initDemuxDemo } from "./demo-common.js";

      initDemuxDemo({
        Events,
        formatLabel: "MP4 / fMP4",
        title: "Demux MP4",
        subtitle:
          "Parse MP4 / fragmented MP4 in the browser. Choose a local file or load the bundled sample; results appear immediately.",
        accept: ".mp4,.m4v,.fmp4,video/mp4",
        sampleUrl: "./hdr420_480_30s.fmp4",
        sampleButtonLabel: "Load sample fMP4",
        createDemux: () =>
          new MP4Demux({
            debug: true,
          }),
        hints: [
          "Uses tree-shakable build: dist/demuxer.mp4.esm.js",
          "Debug logs also go to the developer console.",
        ],
      });
    </script>
  </head>
  <body>
    <div id="demux-demo-root"></div>
  </body>
</html>
